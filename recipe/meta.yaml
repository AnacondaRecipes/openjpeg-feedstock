{% set name = "openjpeg" %}
{% set version = "2.5.4" %}
{% set short_version = version.split('.')[:2] | join('.') %}  # get "major.minor" version string, e.g. "2.5"

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  - url: https://github.com/uclouvain/openjpeg/archive/v{{ version }}.tar.gz
    sha256: a695fbe19c0165f295a8531b1e4e855cd94d0875d2f88ec4b61080677e27188a
  # Data required to run the tests
  - git_url: https://github.com/uclouvain/openjpeg-data.git
    git_rev: 39524bd3a601d90ed8e0177559400d23945f96a9
    folder: opj_data
  # Following upstream pattern on known test failures
  # See upstream repo; tools/travis-ci/knownfailures-*.txt
  - path: tools/conda/knownfailures-win-64.txt
  - path: tools/conda/knownfailures-linux-64.txt
  - path: tools/conda/knownfailures-linux-aarch64.txt
  - path: tools/conda/knownfailures-osx-arm64.txt

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - git
    - cmake
    - make  # [unix]
    - ninja  # [win]
  host:
    # Refer to the package changelog for the latest versions of the dependencies
    # https://github.com/uclouvain/openjpeg/blob/master/CHANGELOG.md
    - libtiff >=4.6.0,<5
    - libpng >=1.6.39,<2  # should be >=1.6.43,<2 as per the package changelog, but we don't have it at this time
    - zlib >=1.3.1,<2
    - lcms2 >=2.8,<3  # for opj_compress, opj_decompress, opj_dump binary executables

outputs:
  - name: lib{{ name }}
    run_exports:
      # good compatibility in 2.x series, check before new release
      # http://www.openjpeg.org/abi-check/timeline/openjpeg/
      - {{ pin_subpackage('lib' + name, max_pin='x.x') }}
    requirements:
      build:
        # OpenJPEG library depends on libm only
        - {{ compiler('c') }}
    files:
      - lib/libopenjp*.dylib  # [osx]
      - lib/libopenjp*.so  # [linux]
      - lib/libopenjp*.so.*  # [linux]
      - lib/pkgconfig/libopenjp*.pc # [linux or osx]
      - lib/cmake/{{ name }}-{{ short_version }}
      - include/{{ name }}-{{ short_version }}

  - name: {{ name }}
    run_exports:
      # good compatibility in 2.x series, check before new release
      # http://www.openjpeg.org/abi-check/timeline/openjpeg/
      - {{ pin_subpackage('lib' + name, max_pin='x.x') }}
    ignore_run_exports:
      # Needed as a transitive build-time dependency but is not actually required by the output binaries.
      - zlib
    requirements:
      build:
        - {{ compiler('c') }}
      host:
        - {{ pin_subpackage('lib' + name, exact=True) }}
        # Refer to the package changelog for the latest versions of the dependencies
        # https://github.com/uclouvain/openjpeg/blob/master/CHANGELOG.md
        - libtiff >=4.6.0,<5
        - libpng >=1.6.39,<2  # should be >=1.6.43,<2 as per the package changelog, but we don't have it at this time
        - zlib >=1.3.1,<2
        - lcms2 >=2.8,<3
      run:
        - {{ pin_subpackage('lib' + name, exact=True) }}
    files:
      - bin/opj_*
    test:
      files:
        - p0_01.j2k
      commands:
        - opj_dump -i p0_01.j2k

about:
    home: https://www.openjpeg.org/
    dev_url: https://github.com/uclouvain/openjpeg
    doc_url: https://github.com/uclouvain/openjpeg/wiki/DocJ2KCodec
    license: BSD-2-Clause
    license_family: BSD
    license_file: LICENSE
    summary: An open-source JPEG 2000 codec written in C.
    description: |
      OpenJPEG is an open-source JPEG 2000 codec written in C language.
      It has been developed in order to promote the use of JPEG 2000,
      a still-image compression standard from the Joint Photographic Experts Group (JPEG).
      Since may 2015, it is officially recognized by ISO/IEC and ITU-T
      as a JPEG 2000 Reference Software.

extra:
  recipe-maintainers:
    - gillins
    - mingwandroid
    - ocefpaf
